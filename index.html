<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 إلى إسلام 💖</title>

<style>

body{
margin:0;
padding:0;
background:linear-gradient(135deg,#ff6ea8,#ffb6d9,#ffd6e8);
font-family:Tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{

background:white;
padding:30px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,.25);
text-align:center;
width:90%;
max-width:500px;

animation:fade 2s;
}

img{

width:220px;
border-radius:20px;
box-shadow:0 0 20px hotpink;

}

h1{

color:#ff2f75;

}

p{

font-size:20px;

}

#timer{

font-size:24px;
font-weight:bold;
color:#ff0066;
margin-top:20px;

}

button{

margin-top:25px;
padding:15px 35px;
border:none;
border-radius:40px;
font-size:20px;
background:#ff2f75;
color:white;
cursor:pointer;

}

button:hover{

background:#ff0055;

}

@keyframes fade{

from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}

}

.heart{

position:absolute;
color:red;
font-size:20px;
animation:fall linear infinite;

}

@keyframes fall{

0%{transform:translateY(-100px);}
100%{transform:translateY(110vh);}

}

</style>

</head>

<body>

<div class="card">

<img src="photo.jpg">

<h1>❤️ إلى إسلام ❤️</h1>

<p>

من نهار 12/07/2025 ❤️<br><br>

كل نهار يزيد حبي ليك أكثر 💖<br><br>

شكراً لأنك أجمل إنسانة في حياتي 🌹

</p>

<div id="timer"></div>

<button onclick="love()">
اضغطي هنا يا روحي ❤️
</button>

</div>

<script>

const start=new Date("2025-07-12");

function update(){

let now=new Date();

let diff=now-start;

let days=Math.floor(diff/1000/60/60/24);

let hours=Math.floor(diff/1000/60/60)%24;

let minutes=Math.floor(diff/1000/60)%60;

let seconds=Math.floor(diff/1000)%60;

document.getElementById("timer").innerHTML=

"💘 "+days+" يوم "
+hours+" ساعة "
+minutes+" دقيقة "
+seconds+" ثانية";

}

setInterval(update,1000);

update();

function love(){

alert("إسلام ❤️\n\nأحبك أكثر من أي شيء في الدنيا 🌹💖");

}

function hearts(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*30)+"px";

h.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},7000);

}

setInterval(hearts,300);

</script>

</body>
</html>
